name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            quality-gate: true
          - os: ubuntu-latest
            python-version: "3.12"
            quality-gate: false
          - os: ubuntu-latest
            python-version: "3.13"
            quality-gate: false
          - os: windows-latest
            python-version: "3.13"
            quality-gate: false

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run portable and integration tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall -q app.py complexation_explorer ingestion curation publication scripts tests

      - name: Check Python code quality
        if: matrix.quality-gate
        run: python -m ruff check app.py complexation_explorer ingestion curation publication scripts tests

      - name: Check Unix launcher syntax
        if: matrix.quality-gate
        run: bash -n run.sh run.command

      - name: Check Windows launchers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install -r requirements-lock.txt
          .\.venv\Scripts\python.exe -c "from pathlib import Path; from tests.support import create_test_database; create_test_database(Path('data/generated/Complexation_Constants_Unified_rebuilt.db'))"
          cmd /c setup_windows.bat --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmd /c run_windows.bat --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmd /c start_windows.bat --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
